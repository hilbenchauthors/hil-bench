services:
  main:
    depends_on:
      sql-tools:
        condition: service_healthy
      business-info:
        condition: service_healthy
    volumes:
      - ${CONTEXT_DIR:-.}/../../shared/data:/data:ro
      - harbor-shared:/harbor_shared

  sql-tools:
    image: hil-bench-harbor/sql-tools:latest
    pull_policy: never
    volumes:
      - ${CONTEXT_DIR:-.}/../../shared/data:/data:ro
      - harbor-shared:/harbor_shared
    environment:
      - DATA_DIR=/data
      - SUBMISSION_FILE=/harbor_shared/submitted_query.sql
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',8000),timeout=2); s.close()"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s

  business-info:
    image: hil-bench-harbor/business-info:latest
    pull_policy: never
    volumes:
      - ${CONTEXT_DIR:-.}/../../shared/data:/data:ro
    environment:
      - DATA_DIR=/data
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',8000),timeout=2); s.close()"]
      interval: 2s
      timeout: 10s
      retries: 30
      start_period: 30s

volumes:
  harbor-shared:
